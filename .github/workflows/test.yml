name: Test

on:
  pull_request:
    branches:
    - main
  push:
    branches:
    - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
        - '3.11'
        - '3.12'
        - '3.13'
        - '3.14'
        marker:
        - -m "not slow"
        include:
        - python-version: '3.14'
          marker: -m "slow and not very_slow"
        - python-version: '3.14'
          marker: -m "very_slow"

    steps:
    - uses: actions/checkout@v5

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        python-version: ${{ matrix.python-version }}
        enable-cache: true

    - name: Install the project
      run: uv sync --locked --all-extras --dev

    - name: Run tests
      run: uv run pytest --cov-report=xml ${{ matrix.marker }}

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        name: py${{ matrix.python-version }}-${{ matrix.marker }}
        fail_ci_if_error: false
